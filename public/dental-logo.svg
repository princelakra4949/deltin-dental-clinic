<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- White background -->
  <rect width="400" height="400" fill="white"/>
  
  <!-- Navy D shape -->
  <path d="M 70 40 L 70 360 L 190 360 
           Q 370 360 370 200 
           Q 370 40 190 40 Z" fill="#0D1B3E"/>
  
  <!-- Inner cutout of D (white space inside) -->
  <path d="M 110 80 L 110 320 L 185 320 
           Q 320 320 320 200 
           Q 320 80 185 80 Z" fill="white"/>
  
  <!-- Gold Tooth shape overlapping the D -->
  <path d="M 85 130
           Q 75 80 115 75
           Q 148 72 155 105
           Q 162 72 195 75
           Q 235 80 225 130
           Q 230 195 210 255
           Q 198 295 175 295
           Q 152 295 140 255
           Q 120 195 85 130 Z" 
        fill="#F5C518" stroke="white" stroke-width="6" stroke-linejoin="round"/>
  
  <!-- Tooth root lines -->
  <line x1="145" y1="220" x2="138" y2="288" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <line x1="157" y1="225" x2="155" y2="292" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <line x1="169" y1="220" x2="172" y2="288" stroke="white" stroke-width="5" stroke-linecap="round"/>
</svg>